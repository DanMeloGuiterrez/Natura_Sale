{% extends 'base.html' %} {% block title %} Registrarse {% endblock %} {% block
registrarse %}
<!-- Formulario de Registrarse -->
<nav class="nav_inicio_seccion">
  <h1 class="nav__title">Registrarse</h1>

  <form action="" method="POST">
    <label for="nombre">Nombre:</label>
    <input type="text" name="nombre" id="nombre" required />

    <label for="apellido">Apellido:</label>
    <input type="text" name="apellido" id="apellido" required />

    <label for="gmail">Gmail:</label>
    <input type="text" name="gmail" id="gmail" required />

    <label for="contrasena">Contraseña:</label>
    <input type="text" name="contrasena" id="contrasena" required />

    <label for="telefono">Teléfono:</label>
    <input type="number" name="telefono" id="telefono" required />

    <label for="direccion">Dirección:</label>
    <input type="text" name="direccion" id="direccion" required />

    <label for="dni">DNI:</label>
    <input type="number" name="dni" id="dni" required />

    <input type="submit" value="Registrarse" class="btn_registrarse" />
  </form>
</nav>
{% endblock %}
